name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC — catches dependency rot
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff format + ruff check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  # ---------------------------------------------------------------------------
  # Unit tests — no API keys or external services needed
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v
